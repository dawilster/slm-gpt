			shellPath = /bin/sh;
			shellScript = "set -e\nREPO=\"$SRCROOT/../..\"\nif [ ! -f \"$REPO/scripts/build-llama-server.sh\" ]; then\n  echo \"error: $REPO/scripts/build-llama-server.sh not found\" >&2\n  exit 1\nfi\n\"$REPO/scripts/build-llama-server.sh\"\nSRC=\"$REPO/llama-runtime\"\nDEST=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/llama-runtime\"\nmkdir -p \"$DEST\"\n# Copy binary + dylibs (rpath = @loader_path so they must sit\n# alongside llama-server). ditto overwrites in place and preserves\n# symlinks for the libfoo.0.dylib -> libfoo.0.X.Y.dylib chain.\nditto \"$SRC/llama-server\" \"$DEST/llama-server\"\nchmod +x \"$DEST/llama-server\"\nfor dylib in \"$SRC\"/lib*.dylib; do\n  ditto \"$dylib\" \"$DEST/$(basename \"$dylib\")\"\ndone\n# Death-pact wrapper — the script ModelServer.swift actually spawns.\n# Polls the Mac app's pid and SIGKILLs llama-server when parent dies\n# (force-kill, crash). Without this llama-server orphans to launchd\n# holding ~3GB of RAM with the GGUF mmap'd.\nditto \"$REPO/scripts/llama-server-supervised.sh\" \"$DEST/llama-server-supervised.sh\"\nchmod +x \"$DEST/llama-server-supervised.sh\"\n";
